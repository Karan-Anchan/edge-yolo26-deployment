name: Deploy WebGPU demo to GitHub Pages

# Publishes code/web_demo/ (the self-contained onnxruntime-web demo) as the
# Pages site root -> https://karan-anchan.github.io/edge-yolo26-deployment/

on:
  push:
    branches: [main]
    paths:
      - "code/web_demo/**"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: code/web_demo
      - id: deployment
        uses: actions/deploy-pages@v4
